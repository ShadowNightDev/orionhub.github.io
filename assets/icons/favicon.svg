<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5b8aff"/>
      <stop offset="50%" stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#00e5c8"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5b8aff"/>
      <stop offset="100%" stop-color="#a259ff"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#04050a"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#g)" stroke-width="1.5"/>
  <!-- Middle ring -->
  <ellipse cx="16" cy="16" rx="13" ry="5" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.6" transform="rotate(-30 16 16)"/>
  <!-- Core -->
  <circle cx="16" cy="16" r="4.5" fill="url(#core)"/>
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.6"/>
</svg>
